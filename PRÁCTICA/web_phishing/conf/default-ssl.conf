# conf/default-ssl.conf 
# HTTP - puerto 80
<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/www.notebookcast.com/es

    <Directory /var/www/html/www.notebookcast.com/es>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /var/log/apache2/error.log
    CustomLog /var/log/apache2/access.log combined
</VirtualHost>

# HTTPS - puerto 443
<VirtualHost *:443>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/www.notebookcast.com/es

    SSLEngine on
    SSLCertificateFile /etc/apache2/sites-enabled/ssl/server.crt
    SSLCertificateKeyFile /etc/apache2/sites-enabled/ssl/server.key

    <Directory /var/www/html/www.notebookcast.com/es>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /var/log/apache2/error.log
    CustomLog /var/log/apache2/access.log combined
</VirtualHost>
ServerName 192.168.40.30
