$( document ).ready(function() {
    $('.carousel').carousel();
  


    function fillBlog(uri){
        var callHeaders = {};
        if (Token !== "") {
            callHeaders = { "Accept-Language": Lang, "authorization": "Bearer " + Token};
        }else{
            callHeaders = { "Accept-Language": Lang};
        }

        var theURL =uri;

        $.ajax({
            type: "GET",
            headers: callHeaders,
            url: theURL,
            contentType: "application/json",
            dataType: 'json',
            success: function (data) {
                $("#single-blog-title").html(data.title);
                $("#single-blog-intro").html(data.introduction);
                $("#single-blog-content").html(data.htmlContent);
            },
            error:  function(responseObject) {

            },
        });

    }

    fillBlog("https:\/\/ipa-og.notebookcast.com\/v1\/blog\/alternativa-a-jamboard");


});
